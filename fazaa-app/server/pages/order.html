<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="pageTitle">فزعة - التسجيل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/order.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container header-content">
            <div class="logo">
                <img src="/images/logo.png" alt="Fazaa">
            </div>
            <nav class="nav">
                <a href="#" class="lang-toggle" id="langToggle" onclick="toggleLanguage(); return false;">English</a>
            </nav>
        </div>
    </header>

    <!-- Order Form -->
    <main class="order">
        <section class="order__hero">
            <h1 class="order__title" data-i18n="pageTitleOrder">كن عضواً</h1>
            
            <!-- Steps Indicator -->
            <div class="order__steps">
                <div class="order__step" data-step="1">
                    <span class="order__step-dot order__step-dot--active">1</span>
                    <span class="order__step-label" data-i18n="stepPersonal">معلومات شخصية</span>
                </div>
                <div class="order__step-line"></div>
                <div class="order__step" data-step="2">
                    <span class="order__step-dot">2</span>
                    <span class="order__step-label" data-i18n="stepAddress">معلومات العنوان</span>
                </div>
                <div class="order__step-line"></div>
                <div class="order__step" data-step="3">
                    <span class="order__step-dot">3</span>
                    <span class="order__step-label" data-i18n="stepSubscribe">اشترك</span>
                </div>
            </div>

            <!-- Error Alert -->
            <div class="alert alert--error" id="errorAlert" style="display: none;">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText"></span>
            </div>

            <form class="order__panel" id="orderForm">
                <p class="order__copy" data-i18n="enterInfo">يرجى إدخال معلوماتك بشكل صحيح</p>

                <!-- Step 1: Personal Info -->
                <div class="order__step-panel order__step-panel--active" data-step-panel="1">
                    <div class="order__field">
                        <label class="order__label" for="full-name" data-i18n="fullName">الاسم الكامل</label>
                        <input id="full-name" name="fullName" class="order__input" type="text" data-i18n-placeholder="fullNamePlaceholder" placeholder="يرجى إدخال اسمك">
                        <span class="order__error" data-error="full-name"></span>
                    </div>
                    <div class="order__field">
    <label class="order__label" for="phone-number" data-i18n="phoneNumber">رقم الهاتف</label>
    <div class="order__phone-wrap">
        <input id="phone-number" name="phoneNumber" class="order__input order__input--phone phone-with-prefix" type="tel" data-i18n-placeholder="phonePlaceholder" placeholder="5xxxxxxxx">
    </div>
    <span class="order__error" data-error="phone-number"></span>
</div>
                    <div class="order__field">
                        <label class="order__label" for="national-id" data-i18n="nationalId">رقم الهوية</label>
                        <input id="national-id" name="nationalId" class="order__input" type="tel" data-i18n-placeholder="nationalIdPlaceholder" placeholder="15 رقم">
                        <span class="order__error" data-error="national-id"></span>
                    </div>
                </div>

                <div class="order__step-panel" data-step-panel="2">
                    <div class="order__field">
                        <label class="order__label" for="city" data-i18n="city">المنطقة</label>
                        <select id="city" name="city" class="order__input order__select">
                            <option value="" data-i18n="selectCity">اختر المنطقة</option>
                            <option value="dubai" data-i18n="dubai">دبي</option>
                            <option value="abu-dhabi" data-i18n="abuDhabi">أبوظبي</option>
                            <option value="sharjah" data-i18n="sharjah">الشارقة</option>
                            <option value="ajman" data-i18n="ajman">عجمان</option>
                        </select>
                        <span class="order__error" data-error="city"></span>
                    </div>
                    <div class="order__field">
                        <label class="order__label" for="street-1" data-i18n="street1">عنوان الشارع</label>
                        <input id="street-1" name="street1" class="order__input" type="text" data-i18n-placeholder="street1Placeholder" placeholder="يرجى إدخال عنوان الشارع">
                        <span class="order__error" data-error="street-1"></span>
                    </div>
                    <div class="order__field">
                        <label class="order__label" for="street-2" data-i18n="street2">الحي (اختياري)</label>
                        <input id="street-2" name="street2" class="order__input" type="text" data-i18n-placeholder="street2Placeholder" placeholder="يرجى إدخال الحي">
                    </div>
                    <div class="order__field">
                        <label class="order__label" for="delivery-date" data-i18n="deliveryDate">موعد الاستلام</label>
                        <input id="delivery-date" name="deliveryDate" class="order__input" type="date">
                        <span class="order__error" data-error="delivery-date"></span>
                    </div>
                </div>

                <!-- Step 3: Summary -->
                <div class="order__step-panel order__step-panel--summary" data-step-panel="3">
                    <h2 class="order__summary-title" data-i18n="invoiceTitle">الفاتورة وطريقة الدفع</h2>
                    
                    <section class="order__summary-card">
                        <h3 class="order__summary-heading" data-i18n="orderSummary">ملخص الطلب</h3>
                        <div class="order__summary-list" id="orderSummary"></div>
                    </section>
                    
                    <section class="order__summary-total">
                        <span class="order__summary-total-label" data-i18n="totalAmount">المبلغ الإجمالي</span>
                        <span class="order__summary-toal-value" id="orderTota">5 <span data-i18n="aed">درهم</span></span>
                    </section>
                </div>

                <div class="order__actions">
                    <button class="order__submit" type="button" id="btnNext" data-action="next"><span data-i18n="next">المتابعة</span></button>
                </div>
            </form>
        </section>
    </main>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="loading-spinner"></div>
            <span data-i18n="verifying">جاري حفظ البيانات...</span>
        </div>
    </div>

    <script src="/js/i18n.js"></script>
    <script src="/js/order.js"></script>
</body>
</html>
