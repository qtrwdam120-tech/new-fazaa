<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تم بنجاح - فزعة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container { max-width: 500px; width: 100%; }
        .card {
            background: #fff;
            border-radius: 24px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            animation: slideUp 0.6s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .success-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #28a745, #2ecc71);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            animation: scaleIn 0.5s ease-out 0.3s both;
        }
        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
        .success-icon i { font-size: 50px; color: #fff; }
        h1 { font-size: 2rem; color: #1a1a2e; margin-bottom: 15px; font-weight: 800; }
        .message { color: #666; font-size: 1.1rem; line-height: 1.7; margin-bottom: 30px; }
        .details {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
            text-align: right;
        }
        .details h3 {
            font-size: 1rem;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .details h3 i { color: #8B1538; }
        .row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px dashed #ddd;
        }
        .row:last-child { border-bottom: none; }
        .row span:first-child { color: #666; }
        .row span:last-child { font-weight: 600; }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px 40px;
            background: linear-gradient(135deg, #8B1538, #6B0F2A);
            color: #fff;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(139,21,56,0.4); }
        .confetti {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }
        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #D4AF37;
            animation: confetti-fall 3s ease-in-out infinite;
        }
        @keyframes confetti-fall {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
        @media (max-width: 480px) {
            .card { padding: 40px 25px; }
            h1 { font-size: 1.6rem; }
            .success-icon { width: 80px; height: 80px; }
            .success-icon i { font-size: 40px; }
        }
    </style>
</head>
<body>
    <div class="confetti">
        <div class="confetti-piece" style="left: 10%; animation-delay: 0s;"></div>
        <div class="confetti-piece" style="left: 20%; animation-delay: 0.5s; background: #8B1538;"></div>
        <div class="confetti-piece" style="left: 30%; animation-delay: 1s;"></div>
        <div class="confetti-piece" style="left: 40%; animation-delay: 0.3s; background: #2ecc71;"></div>
        <div class="confetti-piece" style="left: 50%; animation-delay: 0.8s;"></div>
        <div class="confetti-piece" style="left: 60%; animation-delay: 0.2s; background: #8B1538;"></div>
        <div class="confetti-piece" style="left: 70%; animation-delay: 0.7s;"></div>
        <div class="confetti-piece" style="left: 80%; animation-delay: 0.4s; background: #D4AF37;"></div>
        <div class="confetti-piece" style="left: 90%; animation-delay: 0.9s;"></div>
    </div>
    
    <div class="container">
        <div class="card">
            <div class="success-icon">
                <i class="fas fa-check"></i>
            </div>
            
            <h1>🎉 تهانينا!</h1>
            <p class="message">
                لقد تم التسجيل في عضوية فزعة بنجاح.<br>
                ستتلقى رسالة تأكيد على هاتفك خلال دقائق.
            </p>
            
            <div class="details">
                <h3><i class="fas fa-receipt"></i> تفاصيل الطلب</h3>
                <div class="row">
                    <span>رقم الطلب</span>
                    <span id="orderNumber">#FAZ-2026-001</span>
                </div>
                <div class="row">
                    <span>نوع الباقة</span>
                    <span id="packageType">البلاتينية</span>
                </div>
                <div class="row">
                    <span>مدة الاشتراك</span>
                    <span>سنة واحدة</span>
                </div>
                <div class="row">
                    <span>تاريخ البدء</span>
                    <span id="startDate"></span>
                </div>
            </div>
            
            <a href="/" class="btn" onclick="logout()">
                <i class="fas fa-home"></i>
                العودة للرئيسية
            </a>
        </div>
    </div>
    
    <script>
        // Set today's date
        document.getElementById('startDate').textContent = new Date().toLocaleDateString('ar-AE', {
            year: 'numeric',
            month: 'long',
            day: 'numeric'
        });
        
        // Generate random order number
        document.getElementById('orderNumber').textContent = '#FAZ-2026-' + 
            Math.floor(Math.random() * 1000).toString().padStart(3, '0');
        
        // Get tier from localStorage
        const tier = localStorage.getItem('fazaaTier') || 'platinum';
        const tierNames = {
            platinum: 'البلاتينية',
            gold: 'الذهبية',
            silver: 'الفضية',
            fazaa: 'خصومات فزعة'
        };
        document.getElementById('packageType').textContent = tierNames[tier] || 'غير محدد';
        
        // Logout function
        async function logout() {
            try {
                await fetch('/api/reset-session', { method: 'POST' });
                localStorage.removeItem('fazaaUserId');
                localStorage.removeItem('fazaaTier');
            } catch (e) {}
        }
    </script>
</body>
</html>
