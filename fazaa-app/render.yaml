# Render Blueprint - فزعة Application
# https://render.com/docs/blueprint-spec

services:
  # ================================
  # Fazaa Web Service (Node.js)
  # ================================
  - type: web
    name: fazaa-app
    runtime: node
    region: frankfurt  # أقرب منطقة للسوق العربي
    plan: free
    
    # الكود المصدري
    repo: https://github.com/qtrwdam120-tech/new-fazaa
    branch: main
    rootDir: fazaa-app
    
    # أمر البناء
    buildCommand: npm install
    
    # أمر التشغيل
    startCommand: npm start
    
    # المتغيرات البيئية
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SESSION_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          type: web
          name: fazaa-app
          envVarKey: RENDER_EXTERNAL_URL
    
    # Health check
    healthCheckPath: /api/health
    
    # عدد المثيلات
    numInstances: 1
    
    # الإعداد التلقائي
    autoDeploy: true

